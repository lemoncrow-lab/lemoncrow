name: dedicated-language-support
services:
  api:
    image: atelier/api:latest
    environment:
      LOG_LEVEL: debug
      FEATURE_FLAG: enabled
      CACHE_SIZE: "128"
  worker:
    image: atelier/worker:latest
    environment:
      QUEUE: default
      CONCURRENCY: "4"
metadata:
  owner: platform
  tier: internal
