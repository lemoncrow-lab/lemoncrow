id: smallest-reviewable-change
title: Smallest Reviewable Change
domain: coding
task_types: [debugging, implementation, refactor]
triggers:
  - minimal change
  - reversible probe
  - narrow patch
  - reviewable diff
situation: >
  Local fixes are easier to validate, review, and revert when the first change
  stays tightly scoped to one hypothesis and one behavior.
dead_ends:
  - rewrite a large surface for a local bug
  - mix cleanup with a functional fix
  - change a public API without proving it is necessary
  - make an irreversible edit before the path is validated
procedure:
  - Limit the first edit to the smallest slice that can test the current hypothesis.
  - Keep unrelated cleanup, reformatting, and API changes out of the first patch.
  - Prefer a reversible probe when confidence is incomplete.
  - Add adjacent follow-up edits only after the first validation passes.
verification:
  - The diff matches a single clear intent.
  - Unrelated formatting or cleanup was not mixed into the functional change.
  - The first edit was narrow enough to review quickly.
failure_signals:
  - reviewers must explain multiple problems to understand one fix
  - the first patch changes unrelated modules or public APIs
when_not_to_apply: >
  Large planned migrations where a narrow first slice would be misleading and a
  staged migration plan already exists.
