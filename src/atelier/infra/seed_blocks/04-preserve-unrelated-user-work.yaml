id: preserve-unrelated-user-work
title: Preserve Unrelated User Work
domain: coding
task_types: [debugging, implementation, refactor]
triggers:
  - dirty tree
  - existing changes
  - uncommitted edits
  - merge context
situation: >
  Agents often work in a dirty repository. Unknown changes are not safe to
  discard just because they are inconvenient.
dead_ends:
  - revert unknown changes to get a clean state
  - overwrite neighboring user edits without understanding them
  - use destructive git commands to simplify the task
procedure:
  - Inspect touched files for pre-existing edits before changing them.
  - Work with unrelated changes in place unless they directly conflict.
  - Avoid destructive resets, checkouts, and cleans.
  - If unrelated changes create a direct conflict, stop and surface that conflict explicitly.
verification:
  - Only intended lines or files changed.
  - Unrelated worktree changes were preserved.
  - No destructive git operation was used.
failure_signals:
  - git diff includes unrelated reversions
  - user changes disappear during the task
when_not_to_apply: >
  Repositories or worktrees that were explicitly created as disposable sandboxes.
