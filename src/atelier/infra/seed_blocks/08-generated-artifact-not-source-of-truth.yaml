id: generated-artifact-not-source-of-truth
title: Generated Artifact Is Not Source Of Truth
domain: source.truth
task_types: [bug_fix, content_fix, codegen_fix]
triggers:
  - generated copy
  - ai output
  - cache
  - compiled asset
  - rendered output
  - hallucinated fact
situation: >
  Generated text, cached output, compiled assets, and rendered views are often
  useful observations, but they are not authoritative on their own.
dead_ends:
  - trust generated output as canonical
  - invent facts in a generated artifact
  - reconcile a conflict by editing only the rendered layer
procedure:
  - Treat generated output as observation, not authority.
  - Compare it against the structured or authored source.
  - Correct the source inputs.
  - Regenerate the output.
  - Diff the result to ensure no unsupported facts remain.
verification:
  - Contradiction was resolved at the source.
  - Regenerated output matches the source.
  - No untraceable facts remain in the output.
failure_signals:
  - generated text contradicts structured data
  - cached or compiled output is manually edited
  - untraceable fact appears in the final output
when_not_to_apply: >
  Hand-authored deliverables where the edited file itself is the canonical
  source rather than a generated artifact.
