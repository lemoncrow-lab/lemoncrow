host_id: hermes
name: Hermes Agent
version: 1.0.0
description: Integration with Nous Research Hermes Agent framework
platforms:
- macos
- linux
- windows
detection:
  env_var: HERMES_HOME
  config_path: ~/.hermes/config.yaml
recommended_packs:
- atelier-pack-coding-general
mcp:
  servers:
  - name: atelier
    command: atelier-mcp
    args:
    - --host
    - hermes
    env:
      ATELIER_ROOT: ~/.atelier
installation:
  macos: '# Install Atelier

    brew install atelier


    # Setup Hermes integration

    atelier host setup hermes


    # Verify installation

    atelier host info hermes

    '
  linux: '# Install Atelier

    sudo apt-get install atelier


    # Setup Hermes integration

    atelier host setup hermes


    # Verify installation

    atelier host info hermes

    '
  windows: '# Install Atelier

    choco install atelier


    # Setup Hermes integration

    atelier host setup hermes


    # Verify installation

    atelier host info hermes

    '
prompt_templates:
- name: session-optimization
  template: 'Atelier budget optimizer is active for Hermes.

    Use Atelier MCP tools first for file I/O, search, edits, and shell work.

    Always prefer Atelier MCP tools for file I/O, search, edits, shell, and code-intel
    work.

    Use native host tools only when Atelier returns `noop`, is hidden, or is unavailable.

    Before changing files, name the deliverable and summarize the smallest viable
    plan.

    Keep context narrow: use only the current goal, relevant files, failing command/output,
    and known constraints.

    Restate working context in under 10 bullets before editing or after compaction.

    If more than 10 minutes pass without an edit, name the expected deliverable or
    check with the user.

    If the same approach fails twice, call rescue or change approach; do not retry
    a third time.'
