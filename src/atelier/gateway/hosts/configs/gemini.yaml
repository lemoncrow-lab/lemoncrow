host_id: gemini
name: Gemini CLI
version: 1.0.0
description: Integration with Google Gemini CLI for multi-modal code analysis and
  generation
platforms:
- macos
- linux
- windows
detection:
  command: gcloud ai config list
  config_path: ~/.gemini/settings.json
  env_var: GOOGLE_API_KEY
recommended_packs:
- atelier-pack-gemini-integration
- atelier-pack-multimodal-analysis
- atelier-pack-google-apis
mcp:
  servers:
  - name: atelier
    command: atelier-mcp
    args:
    - --host
    - gemini
    env:
      ATELIER_ROOT: ~/.atelier
installation:
  macos: '# Install Google Cloud SDK

    brew install google-cloud-sdk


    # Install Atelier

    brew install atelier


    # Authenticate with Google Cloud

    gcloud auth application-default login


    # Setup Gemini integration

    atelier host setup gemini


    # Configure Gemini API

    atelier host configure gemini --api-key $GOOGLE_API_KEY


    # Verify installation

    atelier host info gemini

    '
  linux: '# Install Google Cloud SDK

    curl https://sdk.cloud.google.com | bash

    exec -l $SHELL

    gcloud init


    # Install Atelier

    sudo apt-get install atelier  # or your distro''s package manager


    # Authenticate with Google Cloud

    gcloud auth application-default login


    # Setup Gemini integration

    atelier host setup gemini


    # Configure Gemini API

    atelier host configure gemini --api-key $GOOGLE_API_KEY


    # Verify installation

    atelier host info gemini

    '
  windows: '# Install Google Cloud SDK

    choco install google-cloud-sdk


    # Install Atelier

    choco install atelier


    # Authenticate with Google Cloud

    gcloud auth application-default login


    # Setup Gemini integration

    atelier host setup gemini


    # Configure Gemini API

    atelier host configure gemini --api-key %GOOGLE_API_KEY%


    # Verify installation

    atelier host info gemini

    '
prompt_templates:
- name: session-optimization
  template: 'Atelier budget optimizer is active for Gemini.

    Use Atelier MCP tools first for file I/O, search, edits, and shell work.

    Use native host tools only when Atelier returns `noop`, is hidden, or is unavailable.

    Before changing files, name the deliverable and summarize the smallest viable
    plan.

    Keep context narrow: use only the current goal, relevant files, failing command/output,
    and known constraints.

    Restate working context in under 10 bullets before editing or after compaction.

    If more than 10 minutes pass without an edit, name the expected deliverable or
    check with the user.

    If the same approach fails twice, call rescue or change approach; do not retry
    a third time.'
- name: pack-context
  template: 'Atelier pack in use: {pack.name}

    Domain: {pack.domain}


    Reasoning patterns ({pack.reasonblocks_count}):

    {pack.reasonblocks}


    Quality rubrics ({pack.rubrics_count}):

    {pack.rubrics}


    These enhance Gemini''s code analysis with structured reasoning.

    '
- name: multimodal-analysis
  template: 'Analyze code/image using pack ''{pack.name}'' patterns:


    Analysis frameworks:

    - {pack.patterns}


    Validation rules:

    - {pack.validation_rules}


    Apply these quality gates: {pack.rubrics}

    '
- name: generation-guidance
  template: 'Generate code for {pack.domain} using pack ''{pack.name}'':


    Available patterns for generation:

    {pack.generation_patterns}


    Quality assurance checks:

    {pack.qa_rubrics}

    '
