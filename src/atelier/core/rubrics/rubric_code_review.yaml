id: rubric_code_review
domain: coding.review
# What must be true before an atelier:review output is accepted.
required_checks:
  # Every finding must carry a severity label — no unlabelled findings allowed.
  - all_findings_severity_classified
  # Every Blocker-level finding must cite an exact file and line number.
  - all_blockers_have_file_line
  # Every Blocker-level finding must include a concrete fix (code snippet or step).
  - all_blockers_have_fix_snippet
  # The verification ladder was applied: existence → substantive → wired → data-flow.
  - verification_ladder_applied
  # "No issues found" is only reported when files were actually reviewed.
  - skipped_vs_clean_correctly_distinguished
block_if_missing:
  - all_findings_severity_classified
  - all_blockers_have_file_line
  - all_blockers_have_fix_snippet
warning_checks:
  # Style preferences must not be classified as Blocker or Warning.
  - no_style_preferences_as_blockers
  # For changes that touch multiple files, cross-file impact was considered.
  - cross_file_impact_assessed
  # Performance issues are only flagged when they are also correctness issues.
  - performance_only_flagged_when_correctness_risk
escalation_conditions:
  # Hard-coded secrets or credentials present in production code.
  - secret_or_credential_in_code
  # Code that bypasses authentication or authorization checks.
  - authentication_bypass_detected
  # Change that could cause silent data loss or corruption.
  - data_loss_risk_identified
