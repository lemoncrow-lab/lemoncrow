id: rubric_change_gate_discipline
domain: policy.change
required_checks:
  - baseline_captured
  - regression_set_run
  - before_after_diff_reviewed
  - version_or_changelog_updated
block_if_missing:
  - baseline_captured
  - regression_set_run
  - before_after_diff_reviewed
warning_checks:
  - fixture_set_updated
  - rollout_or_rollback_noted
escalation_conditions:
  - user_visible_flip_unreviewed
  - threshold_changed_without_owner_signoff
