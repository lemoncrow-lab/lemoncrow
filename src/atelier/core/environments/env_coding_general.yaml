id: env_coding_general
domain: coding
description: >
  Default operating law for general code-change work. It encodes the
  baseline reliability rules that apply to most edits: start from a concrete
  anchor, keep the first change small, validate the touched slice, and avoid
  damaging unrelated work.

triggers:
  - refactor
  - implement
  - bug fix
  - code change
  - new feature
  - rewrite

forbidden:
  - skip validation entirely
  - broaden scope before local check
  - rewrite a large surface for a local bug
  - revert unrelated user changes

required:
  - concrete_anchor_identified
  - scoped_validation_selected
  - validation_command_run
  - unrelated_changes_preserved

escalate:
  - destructive_action_proposed
  - public_api_changed_without_migration_plan

high_risk_tools:
  - fs.delete
  - fs.bulk_write
  - git.reset
  - git.clean

rubric_id: rubric_code_change

related_blocks:
  - concrete-anchor-before-edit
  - focused-post-edit-validation
  - smallest-reviewable-change
  - preserve-unrelated-user-work
