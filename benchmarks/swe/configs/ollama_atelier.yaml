# Atelier: mini-SWE-agent → Atelier proxy (compresses context) → Ollama qwen3.6
# Same as baseline but routed through port 11435 (the Atelier proxy).
agent:
  step_limit: 40
  cost_limit: 0.

environment:
  environment_class: docker
  cwd: "/testbed"
  timeout: 120

model:
  model_name: "openai/qwen3.6:27b"
  cost_tracking: "ignore_errors"
  model_kwargs:
    temperature: 0.0
    drop_params: true
    api_base: "http://localhost:11435/v1"
    api_key: "ollama"
