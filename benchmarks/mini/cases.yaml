# LemonCrow mini eval suite — cheap, deterministic cost-quality benchmark.
#
# Each case is a small, real, verifiable task against this repository. The
# verify command passes when it exits 0. `starting_git_sha: HEAD` means the
# runner does not reset git before running the case.
#
# A case with `max_cost_usd: 0.00` skips the agent entirely (no LLM call)
# and runs the verify command directly — use this for CLI smoke tests and
# schema assertions.
#
# Run with:
#   lemoncrow benchmark mini --dry-run --json       # offline validation, no API keys
#   lemoncrow benchmark mini --limit 5 --json        # live run, writes a JSON report

cases:
  - id: mini-001-eval-mini-schema-doc
    title: "Add missing docstring to MiniEvalCase"
    prompt: |
      Add a module-level docstring to src/lemoncrow/core/capabilities/eval_mini/schema.py
      explaining what the module contains. One sentence is enough.
    starting_git_sha: HEAD
    allowed_files:
      - "src/lemoncrow/core/capabilities/eval_mini/schema.py"
    command_to_verify: "uv run python -c \"import ast, sys; t=ast.parse(open('src/lemoncrow/core/capabilities/eval_mini/schema.py').read()); sys.exit(0 if isinstance(t.body[0], ast.Expr) else 1)\""
    expected_success_condition: "File has a module docstring as first statement"
    max_cost_usd: 0.02
    tags: [docs, cheap]

  - id: mini-002-eval-mini-dry-run-flag
    title: "Verify dry_run returns all-skipped"
    prompt: |
      In src/lemoncrow/core/capabilities/eval_mini/runner.py, ensure that
      when dry_run=True is passed to run_suite(), all returned case results
      have status="skipped". Add a comment # dry_run: all cases skipped
      at the top of the dry-run branch if not already present.
    starting_git_sha: HEAD
    allowed_files:
      - "src/lemoncrow/core/capabilities/eval_mini/runner.py"
    command_to_verify: "uv run python -c \"from lemoncrow.core.capabilities.eval_mini.runner import run_suite; print('ok')\""
    expected_success_condition: "Module imports without error"
    max_cost_usd: 0.03
    tags: [code, cheap]

  - id: mini-003-lemoncrow-benchmark-mini-help
    title: "Verify lemoncrow benchmark mini --help works"
    prompt: |
      No changes needed. Just confirm lemoncrow benchmark mini --help exits 0.
    starting_git_sha: HEAD
    allowed_files: []
    command_to_verify: "uv run lemoncrow benchmark mini --help"
    expected_success_condition: "lemoncrow benchmark mini --help exits 0"
    max_cost_usd: 0.00
    tags: [cli, trivial]

  - id: mini-004-report-fields
    title: "Confirm MiniEvalReport has all required fields"
    prompt: |
      Verify that MiniEvalReport in schema.py has fields: total_tasks,
      accepted_tasks, failed_tasks, accepted_patch_rate, total_cost_usd,
      cost_per_accepted_patch, trace_coverage_pct. Do not change anything
      unless a field is genuinely missing.
    starting_git_sha: HEAD
    allowed_files:
      - "src/lemoncrow/core/capabilities/eval_mini/schema.py"
    command_to_verify: "uv run python -c \"from lemoncrow.core.capabilities.eval_mini.schema import MiniEvalReport; r=MiniEvalReport.model_fields; assert all(f in r for f in ['total_tasks','accepted_tasks','failed_tasks','total_cost_usd','trace_coverage_pct'])\""
    expected_success_condition: "MiniEvalReport has all required fields"
    max_cost_usd: 0.02
    tags: [schema, cheap]

  - id: mini-005-dry-run-no-network
    title: "lemoncrow benchmark mini --dry-run --json works offline"
    prompt: |
      No agent call needed. The dry-run command should load cases and
      produce a dry_run report without network access.
    starting_git_sha: HEAD
    allowed_files: []
    command_to_verify: "uv run lemoncrow benchmark mini --dry-run --json --output /tmp/mini-dry-run-test.json && python3 -c \"import json; d=json.load(open('/tmp/mini-dry-run-test.json')); assert d['status']=='dry_run'\""
    expected_success_condition: "dry_run report written with status=dry_run"
    max_cost_usd: 0.00
    tags: [cli, dry_run]
