services:
  service:
    container_name: ${ATELIER_SERVICE_CONTAINER:-atelier-service}
    build:
      context: .
      dockerfile: Dockerfile.api
    command:
      [
        "atelier",
        "service",
        "start",
        "--host",
        "0.0.0.0",
        "--port",
        "8787",
        "--reload",
      ]
    ports:
      - "${ATELIER_SERVICE_PORT:-8787}:8787"
    environment:
      - ATELIER_SERVICE_HOST=0.0.0.0
      - ATELIER_SERVICE_PORT=8787
      - ATELIER_REQUIRE_AUTH=false
      - ATELIER_ROOT=/app/.atelier
      - ATELIER_OTEL_ENDPOINT=http://otel-collector:4318
    volumes:
      - ${ATELIER_STACK_ROOT:-~/.atelier}:/app/.atelier
      - ./integrations:/app/integrations:ro
      - ./src:/app/src
    restart: unless-stopped

  # otel-collector:
  #   image: otel/opentelemetry-collector-contrib:0.100.0
  #   command: ["--config=/etc/otelcol/config.yaml"]
  #   environment:
  #     - POSTHOG_OTLP_ENDPOINT=${POSTHOG_OTLP_ENDPOINT:-https://us.i.posthog.com/i/v0/otlp}
  #     - POSTHOG_PROJECT_API_KEY=${POSTHOG_PROJECT_API_KEY:-}
  #     - GCP_PROJECT_ID=${GCP_PROJECT_ID:-}
  #   volumes:
  #     - ./deploy/otel-collector.yaml:/etc/otelcol/config.yaml:ro
  #   ports:
  #     - "4318:4318"
  #   restart: unless-stopped

  frontend:
    container_name: ${ATELIER_FRONTEND_CONTAINER:-atelier-frontend-dev}
    image: oven/bun:1
    working_dir: /app
    command: ["sh", "-c", "bun install && bun run dev"]
    ports:
      - "${ATELIER_FRONTEND_PORT:-3125}:3125"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8787}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped
    depends_on:
      service:
        condition: service_started

