"src/atelier/gateway/hosts/session_parsers/gemini.py" = ["BLE001"]
"src/atelier/gateway/hosts/session_parsers/opencode.py" = ["BLE001"]
"src/atelier/__init__.py" = ["BLE001"]
"src/atelier/core/capabilities/autopilot/capability.py" = ["BLE001"]
"src/atelier/core/capabilities/autopilot/factory.py" = ["BLE001"]
"src/atelier/core/capabilities/budget_optimizer/optimizer.py" = ["BLE001"]
"src/atelier/core/capabilities/code_context/engine.py" = ["BLE001"]
"src/atelier/core/capabilities/code_context/intel_store.py" = ["BLE001"]
