# Benchmark dev-CLIs under src/benchmarks/** with print (T201) debt only. These keep
# stdout intentionally as their report channel (Phase 24, QBL-LOG-03); converted non-CLI
# files (goose.py, kiro.py, infra/benchmarks/publisher.py) had their T201 ignores removed.
"src/benchmarks/code_intel/scale_decision_eval.py" = ["T201"]
"src/benchmarks/swe/savings_bench.py" = ["T201"]
"src/benchmarks/swe/swebench_eval.py" = ["T201"]
"src/benchmarks/tool_bench/__main__.py" = ["T201"]

[tool.black]
line-length = 120
target-version = ["py311"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers -m 'not slow'"
pythonpath = ["src", "."]
markers = [
    "slow: marks tests as slow",
    "ab: real A/B benchmark (atelier tool vs native); writes to ~/.atelier/savings_calibration.jsonl; run with `make bench-ab`",
    ]

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_ignores = true
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = [
    "atelier.core.service.api",
    "atelier.gateway.adapters.http_api",
]
disable_error_code = ["untyped-decorator"]

[[tool.mypy.overrides]]
module = [
    "atelier.gateway.cli.app",
]
ignore_errors = true

[dependency-groups]
dev = [
    "black>=24.4",
    "httpx>=0.27",
    "mypy>=1.20.2",
    "pytest>=9.0.3",
    "pytest-cov>=5.0",
    "pytest-timeout>=2.4.0",
    "pytest-xdist>=3.8.0",
    "ruff>=0.5",
    "types-PyYAML",
]
