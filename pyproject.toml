"src/atelier/infra/memory_bridges/letta_adapter.py" = ["BLE001"]
"src/atelier/infra/memory_bridges/openmemory.py" = ["BLE001"]
"src/atelier/infra/runtime/checkpoint.py" = ["BLE001"]
"src/atelier/infra/runtime/context_compressor.py" = ["BLE001"]
