[project]
name = "atelier"
version = "0.2.0"
description = "Agent Reasoning Runtime — reusable procedures, failure rescue, and rubric verification for coding and product agents."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "Atelier" }]

classifiers = [
    "License :: OSI Approved :: Apache Software License",
]

dependencies = [
    "pydantic>=2.6",
    "click>=8.1",
    "pyyaml>=6.0",
    "rich>=13.7",
    "litellm>=1.83.14",
    "tiktoken>=0.9",
    "blake3>=0.4.1",
    "datasketch>=1.6",
    "tree-sitter>=0.23",
    "GitPython>=3.1.50",
    "pygit2==1.19.2",
    "prometheus-client>=0.21",
    "tenacity>=9.0",
    "pybreaker>=1.2",
    "river>=0.22",
    "networkx>=3.4",
    "mypy>=1.20.2",
    "types-pyyaml>=6.0.12.20260408",
    "ortools>=9.10",
    "opentelemetry-api>=1.27",
    "opentelemetry-sdk>=1.27",
    "opentelemetry-exporter-otlp-proto-http>=1.27",
    "fastapi>=0.136.1",
    "uvicorn[standard]>=0.46.0",
    "urllib3>=2.7.0",
    "pydantic-settings>=2.14.0",
    "python-multipart>=0.0.27",
    "sqlalchemy>=2.0.49",
    "ollama>=0.6.2",
    "diff-match-patch>=2.1",
    "tree-sitter-language-pack>=1.8.1",
    "pexpect>=4.9.0",
]

[project.optional-dependencies]
mcp = ["mcp>=1.0"]
memory = ["letta-client>=1.7.12"]
memory-server = ["letta>=0.16.7"]
smart = ["ollama>=0.4.0"]
cloud = ["openai>=1.0"]
repo-map = ["tree-sitter>=0.23", "tree-sitter-languages>=1.10; python_version < '3.13'", "networkx>=3.4"]
api = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
]
postgres = [
    "psycopg[binary]>=3.1",
]
vector = [
    "pgvector>=0.2",
    "numpy>=1.26",
]
parsers = [
    "tree-sitter-languages>=1.10; python_version < '3.13'",
]
rename = ["rope>=0.23"]
telemetry = [
    "opentelemetry-api>=1.27",
    "opentelemetry-sdk>=1.27",
    "opentelemetry-exporter-otlp-proto-http>=1.27",
]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.5",
    "black>=24.4",
    "mypy>=1.10",
    "types-PyYAML",
]

[project.scripts]
atelier = "atelier.gateway.cli:main"
atelier-mcp = "atelier.gateway.adapters.mcp_server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/atelier", "src/benchmarks"]

[tool.hatch.build.targets.wheel.force-include]
"src/atelier/infra/seed_blocks" = "atelier/infra/seed_blocks"
"src/atelier/core/rubrics" = "atelier/core/rubrics"
"src/atelier/core/service/telemetry/frustration_lexicon.yaml" = "atelier/core/service/telemetry/frustration_lexicon.yaml"
"templates/reasonblocks" = "atelier/templates/reasonblocks"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "BLE", "T20", "UP", "SIM", "RUF"]
ignore = ["E501"]

# M2/M3 BLE001/T201 burn-down worklist (Phase 22 prevention gates).
# These files carry PRE-EXISTING blind-except / print debt parked here so the rules
# stay globally enabled (new debt in clean files still fails lint). Re-derive with:
#   uv run ruff check src --select BLE001 --output-format=concise | grep -oE "^src/[^:]+" | sort -u
#   uv run ruff check src --select T20    --output-format=concise | grep -oE "^src/[^:]+" | sort -u
# Burn these down in Phases 23/24 by fixing the code and removing the entry.
[tool.ruff.lint.per-file-ignores]
# Benchmark dev-CLIs under src/benchmarks/** with both blind-except (BLE001) and
# print (T201) debt. The T201 ignore is INTENTIONAL here: src/benchmarks/** stdout is
# the report channel for these developer-facing CLIs (Phase 24, QBL-LOG-03). Their
# BLE001 entries remain pre-existing burn-down debt.
"src/benchmarks/swe/routing_replay_bench.py" = ["BLE001", "T201"]
"src/benchmarks/swe/savings_replay.py" = ["BLE001", "T201"]
"src/benchmarks/tool_bench/report.py" = ["BLE001", "T201"]
# Files with blind-except (BLE001) debt only (T201 converted to logging in Phase 24):
"src/atelier/gateway/adapters/mcp_server.py" = ["BLE001"]
"src/atelier/gateway/hosts/registry.py" = ["BLE001"]
"src/atelier/gateway/hosts/session_parsers/_common.py" = ["BLE001"]
