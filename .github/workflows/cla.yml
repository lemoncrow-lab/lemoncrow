name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: >-
          (github.event.comment.body == 'recheck' ||
           github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: signatures/version1/cla.json
          path-to-document: https://github.com/lemoncrowhq/lemoncrow/blob/main/CLA.md
          branch: main
          # Accounts that never need to sign (bots, and add the maintainer's
          # GitHub username here to skip self-signing on direct PRs).
          allowlist: lemoncrow,dependabot[bot]
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          custom-notsigned-prcomment: "Thanks for your pull request! Before it can be merged, please read our [Contributor License Agreement](https://github.com/lemoncrowhq/lemoncrow/blob/main/CLA.md) and sign it by posting the exact comment below."
          custom-allsigned-prcomment: "All contributors have signed the CLA. ✅"
